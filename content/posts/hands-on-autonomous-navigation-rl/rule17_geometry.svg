<svg viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f3a5f"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b45309"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="898" height="598" rx="14" fill="#f7f7f5" stroke="#ddd" stroke-width="2"/>

  <text x="450" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="#222">Rule 17: Stand-On Vessel Geometry</text>
  <text x="450" y="64" text-anchor="middle" font-size="13" fill="#777">Top-down view, own ship's perspective. Own ship's heading is taken as due north for clarity.</text>

  <text x="130" y="95" text-anchor="middle" font-size="13" fill="#888" font-style="italic">PORT</text>
  <text x="770" y="95" text-anchor="middle" font-size="13" fill="#888" font-style="italic">STARBOARD</text>

  <line x1="450" y1="460" x2="450" y2="80" stroke="#1f3a5f" stroke-width="2.5" stroke-dasharray="10,6" marker-end="url(#arrowNavy)"/>
  <text x="460" y="105" font-size="13" fill="#1f3a5f">AHEAD: maintains course and speed</text>

  <polygon points="450,460 468,495 462,525 438,525 432,495" fill="#1f3a5f" stroke="#0f1f33" stroke-width="2"/>
  <text x="450" y="555" text-anchor="middle" font-size="13" font-weight="bold" fill="#1f3a5f">Own Ship</text>

  <polygon points="270,230 180,185 205,150" fill="#d97706" stroke="#92400e" stroke-width="2"/>
  <text x="175" y="135" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400e">Vessel B</text>

  <line x1="270" y1="230" x2="425" y2="355" stroke="#d97706" stroke-width="2.5" stroke-dasharray="8,5"/>

  <path d="M 380,300 Q 460,330 480,400" fill="none" stroke="#b45309" stroke-width="2.5" marker-end="url(#arrowOrange)"/>
  <text x="495" y="395" font-size="13" fill="#92400e">Expected: alter course to</text>
  <text x="495" y="412" font-size="13" fill="#92400e">starboard, pass astern (Rule 15)</text>

  <line x1="450" y1="460" x2="270" y2="230" stroke="#999" stroke-width="1.2" stroke-dasharray="3,4"/>
  <text x="335" y="365" font-size="12" fill="#888" transform="rotate(-50 335 365)">relative bearing</text>

  <rect x="40" y="500" width="18" height="18" fill="#1f3a5f"/>
  <text x="68" y="514" font-size="13" fill="#222">Own Ship: stand-on under Rule 17, holds course and speed</text>

  <rect x="40" y="530" width="18" height="18" fill="#d97706"/>
  <text x="68" y="544" font-size="13" fill="#222">Vessel B: give-way under Rule 15, must keep clear</text>

  <text x="450" y="585" text-anchor="middle" font-size="11" fill="#999">Every approach I benchmarked takes early evasive action here instead of holding, see "The COLREGs Problem Neither Approach Fully Solves"</text>
</svg>
